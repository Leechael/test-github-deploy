name: Test Phala Deploy Action

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Phala Cloud
        id: deploy
        uses: Leechael/phala-deploy-action@main
        with:
          api-key: ${{ secrets.PHALA_CLOUD_API_KEY }}

      - name: Show outputs
        if: always()
        run: |
          echo "Status: ${{ steps.deploy.outputs.status }}"
          echo "App ID: ${{ steps.deploy.outputs.app-id }}"
          echo "VM UUID: ${{ steps.deploy.outputs.vm-uuid }}"
          echo "CVM Name: ${{ steps.deploy.outputs.cvm-name }}"
          echo "Dashboard: ${{ steps.deploy.outputs.dashboard-url }}"
          echo "Compose Hash: ${{ steps.deploy.outputs.compose-hash }}"
          echo "OS Image: ${{ steps.deploy.outputs.os-image }}"
          echo "OS Version: ${{ steps.deploy.outputs.os-image-version }}"
          echo "KMS Type: ${{ steps.deploy.outputs.kms-type }}"
          echo "Device ID: ${{ steps.deploy.outputs.device-id }}"
